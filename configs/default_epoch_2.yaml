paths:
  cache_dir_name: _cache
  debug_dir_name: _debug
compute:
  device: cpu
  num_workers: 0
  batch_size: 1
  use_sam: false
  use_reid: false
camera:
  camera_id: cam01
  fps: 30
stages:
  stage_A:
    mode: real
    frame_stride: 1
    detector:
      model_path: models/yolov8n.pt
      seg_model_path: models/yolov8s-seg.pt
      use_seg: true
      conf: 0.25
      imgsz: null
      device: null
    masks:
      gate:
        det_conf_min: 0.25
        mask_quality_min: 0.4
        min_area_frac: 0.1
        max_area_frac: 1.1
    tracker:
      mode: botsort
      with_reid: false
      use_mask_bbox: true
      params: {}
      physics:
        audit_only: true
        max_speed_mps: 8.0
  stage_B:
    enabled: null
  stage_C:
    sample_frames_for_tags: 0
    tag_family: 36h11
    c0_scheduler:
      enabled: true
      k_seek: 1
      k_verify: 30
      n_ramp: 60
      gating:
        enabled: true
        bbox_pad_frac: 0.15
        min_det_conf: 0.25
        min_roi_side_px: 40
        min_roi_area_px: 2500
        require_on_mat: true
        use_scannability_prior: true
        prior_min: 0.2
        prior_path: null
        blur:
          method: laplacian_var
          min_var: 60.0
        contrast:
          method: gray_std
          min_std: 18.0
      triggers:
        enabled: true
        cooldown_frames: 15
        extend_ramp_on_retrigger: true
        overlap:
          iou_thresh: 0.35
          window_frames: 6
        motion:
          enabled: true
          prefer_metric: true
          dv_thresh_mps: 2.5
          a_thresh_mps2: 12.0
          dv_thresh_pxps: 250.0
          a_thresh_pxps2: 1200.0
  stage_D:
    enabled: null
    run_until: D3
    d3_checkpoint: POC_1
    d0:
      occlusion_repair:
        enable_normalized: true
        min_bottom_frac: 0.15
        min_height_frac: 0.1
        onset_window: 5
        onset_min_frames: 1
        recover_bottom_frac: 0.1
        recover_height_frac: 0.08
        recover_min_frames: 3
        merge_gap_frames: 2
        min_window_frames: 2
        max_span_frames: null
        dy2_px_min: 3.0
      global_context:
        context_radius_m: null
        candidate_radius_m: null
      kinematics:
        enabled: true
        v_max_mps: 8.0
        a_max_mps2: 12.0
    qa:
      enabled: false
      group_by: auto
      prefer_repaired: true
      output_name: stage_D_paths.png
      mat_blueprint_path: configs/mat_blueprint.json
      canvas_size_px: 800
      margin_px: 24
    d1:
      enabled: true
      enable_lifespan_segmentation: true
      min_group_duration_frames: 10
      min_split_separation_frames: 10
      carrier_coord_window_frames: 15
      merge_trigger_max_age_frames: 90
      write_debug_graph_artifacts: true
      max_continue_gap_frames: 300
      start_window_frames: 10
      end_window_frames: 10
      enable_group_nodes: true
      merge_dist_m: 1.5
      merge_end_sync_frames: 3
      merge_disappear_gap_frames: 6
      split_dist_m: 2.0
      split_search_horizon_frames: 2700
      reconnect_enabled: true
    d2_costs:
      enabled: true
      missing_geom_policy: disallow
      dt_max_s: 1.0
      v_cost_scale_mps: null
      v_hinge_mps: null
      w_time: 0.1
      w_vreq: 0.5
      base_env_cost: 0.01
      use_flags: true
      w_flags: 0.25
      use_contact_rel: true
      contact_conf_floor: 0.25
      contact_rel_alpha: 0.35
      bonus_group_coherent: 0.75
      penalty_group_incoherent: 0.75
      birth_cost: 2.0
      death_cost: 2.0
      merge_prior: 0.1
      split_prior: 0.1
      reconnect_extra_env_cost: 1.0
      reconnect_w_z: 1.0
      reconnect_w_time: 0.0
    d3:
      unexplained_tracklet_penalty: 5.0
  stage_E:
    enabled: null
  stage_F:
    enabled: null
