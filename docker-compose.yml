# Root compose — orchestrates nest_recorder and uploader.
# Processor runs natively on Mac via services/processor/run_local.sh
# for better ARM performance. Uncomment for Linux deployment.
# Usage: cp .env.example .env && <fill values> && docker compose up --build

services:
  recorder:
    build: services/nest_recorder/recorder
    platform: linux/arm64
    container_name: roll-recorder
    restart: unless-stopped
    env_file: .env
    environment:
      TZ: ${TZ:-America/New_York}
      SDM_SECRETS_DIR: /secrets
    volumes:
      - ./data/raw/nest:/recordings
      - ./services/nest_recorder/secrets:/secrets:ro
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  # processor service commented out — runs natively on Mac via
  # services/processor/run_local.sh for better ARM performance.
  # Uncomment for Linux deployment on mini-PC where Docker
  # overhead is minimal.
  #
  # processor:
  #   build:
  #     context: .
  #     dockerfile: services/processor/Dockerfile
  #   platform: linux/arm64
  #   container_name: roll-processor
  #   restart: unless-stopped
  #   env_file: .env
  #   volumes:
  #     - ./data/raw/nest:/app/data/raw/nest:ro
  #     - ./outputs:/app/outputs
  #     - ./configs:/app/configs:ro
  #     - ./models:/app/models:ro
  #   depends_on:
  #     - recorder
  #   logging:
  #     driver: json-file
  #     options:
  #       max-size: "10m"
  #       max-file: "3"

  uploader:
    build:
      context: .
      dockerfile: services/uploader/Dockerfile
    platform: linux/arm64
    container_name: roll-uploader
    restart: unless-stopped
    env_file: .env
    environment:
      UPLOADER_SCAN_ROOT: /app/outputs
    volumes:
      - ./outputs:/app/outputs
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
